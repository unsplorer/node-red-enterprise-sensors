name: Build Node-RED Module TGZ

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build TGZ package
        run: npm pack
        # will generate: unsplorer-node-red-enterprise-sensors-*.tgz

      - name: Upload TGZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodered-module-tgz
          path: "*.tgz"
